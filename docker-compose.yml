version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    network_mode: "host"
    environment:
      POSTGRES_DB: stationmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    network_mode: "host"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/stationmap
      ADMIN_KEY: ${ADMIN_KEY:-changeme-secret-key}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    network_mode: "host"
    depends_on:
      - api

volumes:
  pgdata:
